<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Razia 🤍</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Landing -->
    <section id="landing" class="landing">

        <div class="landing-content">

            <p class="subtitle">
                For Razia
            </p>

            <h1>
                A small corner of the internet,<br>
                made only for you.
            </h1>

            <button id="beginBtn">
                Begin
            </button>

        </div>

    </section>

    <!-- Hero -->
    <section id="hero" class="hero">

        <div class="hero-image">

            <img src="images/hero.jpeg" alt="Our favorite memory">

        </div>

        <div class="hero-text">

            <h2>Every memory with you became one of my favorites.</h2>

            <p>
                I wanted to make something that lasts a little longer than a message.
                So... I made this little place just for you.
            </p>

        </div>

    </section>

    <!-- Memories (placeholder for now) -->
    <section id="memories">

        <h2>Our Memories</h2>

        <p>
            This is where our story will slowly unfold...
        </p>

    </section>

    <script src="js/app.js"></script>

</body>

</html>
