<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Little World ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Cute Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Background -->
    <div id="background"></div>

    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <!-- Floating Stars -->
    <div id="stars"></div>

    <!-- Welcome Screen -->
    <section id="welcome">

        <div class="envelope">

            <div class="heart">
                ❤️
            </div>

            <h1>Someone made something just for you</h1>

            <button id="openButton">
                Open
            </button>

        </div>

    </section>

    <!-- Homepage (hidden initially) -->

    <section id="mainPage">

        <h1 class="title">
            Our Little World ❤️
        </h1>

        <p class="subtitle">
            Every moment with you is my favorite memory.
        </p>

        <!-- Photos go here later -->
        <div id="photoContainer">

        </div>

        <div class="buttons">

            <button id="messageButton">
                💌 Read My Letter
            </button>

            <button id="galleryButton">
                📷 Memories
            </button>

            <button id="musicButton">
                🎵 Music
            </button>

        </div>

    </section>

    <!-- Love Letter Popup -->

    <div id="letterPopup">

        <div class="letter">

            <span id="closeLetter">
                ✖
            </span>

            <h2>
                To My Favorite Person ❤️
            </h2>

            <div id="letterContent">

                Your message will go here...

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
